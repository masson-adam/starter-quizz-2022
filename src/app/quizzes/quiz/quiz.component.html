<div class="card" *ngIf="quiz">
    <h2>
        <i class="fab fa-leanpub"></i>
        Nom : {{quiz.name}} <br>
        <span>Thème : {{quiz.theme}} </span> <br>
        <span>Nb questions : {{quiz.questions.length}}</span><br>
        <span *ngIf="quiz.creationDate">Date de Création : {{quiz.creationDate | date : 'dd/MM/yyyy'}}</span>
    </h2>
    <button class="button-card" (click)="selectQuiz()">Select</button>
    <button class="button-card" [routerLink]="['/edit-quiz', quiz.id]">Edit</button>
    <button class="button-card" (click)="deleteQuiz()">Delete</button> 
</div>
